<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calascii</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #0d0d0d; overflow: hidden; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 0; left: 0; right: 0;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 10px 14px;
        pointer-events: none;
        user-select: none;
        font-family: "Courier New", monospace;
        font-size: 11px;
        color: #3d4a5c;
      }
      #hud-left { display: flex; flex-direction: column; gap: 3px; }
      #hud-title { color: #4a6080; font-size: 13px; letter-spacing: 2px; }
      #hud-coords { color: #2d3a4a; }
      #hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
      #hud-status { transition: color 0.3s; }
      #hud-help { color: #2a3340; }

      #hud-status.connected { color: #2d6a4a; }
      #hud-status.disconnected { color: #6a2d2d; }

      #hud-auth { pointer-events: auto; }
      #hud-auth a {
        color: #3d4a5c;
        text-decoration: none;
        letter-spacing: 1px;
        transition: color 0.2s;
      }
      #hud-auth a:hover { color: #6a8aaa; }
      #hud-username {
        cursor: pointer;
        transition: color 0.2s;
      }
      #hud-username:hover { color: #6a8aaa; }
      #hud-auth input {
        font-family: "Courier New", monospace;
        font-size: 11px;
        color: #4a6080;
        background: transparent;
        border: none;
        border-bottom: 1px solid #2a3a50;
        outline: none;
        letter-spacing: 1px;
        width: 120px;
        padding: 0;
      }

      #auth-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(13, 13, 13, 0.8);
        z-index: 100;
        font-family: "Courier New", monospace;
      }
      #auth-modal-box {
        border: 1px solid #1e2a38;
        background: #0d0d0d;
        padding: 28px 32px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 260px;
      }
      #auth-modal-title {
        color: #4a6080;
        font-size: 13px;
        letter-spacing: 2px;
      }
      #auth-modal-text {
        color: #3d4a5c;
        font-size: 11px;
        letter-spacing: 1px;
        line-height: 1.6;
      }
      #auth-modal-actions {
        display: flex;
        gap: 16px;
        align-items: center;
        margin-top: 4px;
      }
      #auth-modal-login {
        font-family: "Courier New", monospace;
        font-size: 11px;
        color: #4a6080;
        text-decoration: none;
        letter-spacing: 1px;
        border: 1px solid #1e2a38;
        padding: 5px 10px;
        transition: color 0.2s, border-color 0.2s;
      }
      #auth-modal-login:hover { color: #6a8aaa; border-color: #3a5070; }
      #auth-modal-dismiss {
        font-family: "Courier New", monospace;
        font-size: 11px;
        color: #2d3a4a;
        background: transparent;
        border: none;
        padding: 0;
        cursor: pointer;
        letter-spacing: 1px;
        transition: color 0.2s;
      }
      #auth-modal-dismiss:hover { color: #3d4a5c; }

      .corner-btn {
        font-family: "Courier New", monospace;
        font-size: 11px;
        color: #3d4a5c;
        background: transparent;
        border: 1px solid #1e2a38;
        padding: 5px 10px;
        cursor: pointer;
        letter-spacing: 1px;
        transition: color 0.2s, border-color 0.2s;
        user-select: none;
      }
      .corner-btn:hover { color: #6a8aaa; border-color: #3a5070; }

      #share-btn {
        position: fixed;
        bottom: 14px;
        right: 14px;
      }
      #share-btn.copied { color: #2d6a4a; border-color: #2d6a4a; }

      #zoom-controls {
        position: fixed;
        bottom: 14px;
        left: 14px;
        display: flex;
        gap: 4px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <input id="mobile-input" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="position:fixed;opacity:0;top:-100px;left:0;width:1px;height:1px;pointer-events:none;" />
    <button id="share-btn" class="corner-btn">share</button>
    <div id="zoom-controls">
      <button id="zoom-out" class="corner-btn">-</button>
      <button id="zoom-in" class="corner-btn">+</button>
    </div>
    <div id="auth-modal" style="display:none">
      <div id="auth-modal-box">
        <div id="auth-modal-title">LOGIN REQUIRED</div>
        <div id="auth-modal-text">you need to be logged in to edit tiles.</div>
        <div id="auth-modal-actions">
          <a href="/auth/discord/login" id="auth-modal-login">login with discord</a>
          <button id="auth-modal-dismiss">dismiss</button>
        </div>
      </div>
    </div>
    <div id="hud">
      <div id="hud-left">
        <div id="hud-title">CALASCII</div>
        <div id="hud-coords">0, 0</div>
      </div>
      <div id="hud-right">
        <div id="hud-status" class="disconnected">connecting</div>
        <div id="hud-auth"></div>
        <div id="hud-help">drag to pan &nbsp; click to place cursor &nbsp; type to write</div>
      </div>
    </div>

    <script>
      const CHUNK_SIZE = 50;
      const BASE_CELL_W = 12;
      const BASE_CELL_H = 18;

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const hudCoords = document.getElementById('hud-coords');
      const hudStatus = document.getElementById('hud-status');
      const mobileInput = document.getElementById('mobile-input');
      const isMobile = navigator.maxTouchPoints > 0;

      let logW = window.innerWidth;
      let logH = window.innerHeight;

      let zoom = 1.0;
      let cellW = BASE_CELL_W;
      let cellH = BASE_CELL_H;

      const chunks = new Map();       // "gx,gy" -> data[sx][sy] (from server)
      const requested = new Set();    // "gx,gy" chunks already sent a get for

      let offsetX = 0;
      let offsetY = 0;

      let cursor = null;  // { wx, wy }
      let cursorOn = true;
      let selection = null; // { start: {wx, wy}, end: {wx, wy} }

      let dragging = false;
      let selecting = false;
      let dragStartX = 0, dragStartY = 0;
      let dragBaseOffX = 0, dragBaseOffY = 0;
      let dragMoved = false;

      let pinchDist = null;

      let ws = null;

      let myId = null;
      const otherCursors = new Map(); // id → {wx, wy}
      const PALETTE = [
        ['#ef4444', 'rgba(239,68,68,0.18)'],
        ['#f97316', 'rgba(249,115,22,0.18)'],
        ['#eab308', 'rgba(234,179,8,0.18)'],
        ['#22c55e', 'rgba(34,197,94,0.18)'],
        ['#06b6d4', 'rgba(6,182,212,0.18)'],
        ['#a855f7', 'rgba(168,85,247,0.18)'],
        ['#ec4899', 'rgba(236,72,153,0.18)'],
      ];
      let paletteIdx = 0;
      const colorMap = new Map(); // id → [solid, faint]
      function getColor(id) {
        if (!colorMap.has(id)) colorMap.set(id, PALETTE[paletteIdx++ % PALETTE.length]);
        return colorMap.get(id);
      }

      let isAuthenticated = false;
      const hudAuth = document.getElementById('hud-auth');
      const authModal = document.getElementById('auth-modal');

      function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function renderUsername(name) {
        hudAuth.innerHTML = `<span id="hud-username">${escapeHtml(name)}</span> &nbsp; <a href="/auth/logout">logout</a>`;
        document.getElementById('hud-username').addEventListener('click', () => startUsernameEdit(name));
      }

      function startUsernameEdit(current) {
        let committed = false;
        hudAuth.innerHTML = `<input id="hud-username-input" type="text" value="${escapeHtml(current)}" maxlength="32" spellcheck="false" autocomplete="off"> &nbsp; <a href="/auth/logout">logout</a>`;
        const input = document.getElementById('hud-username-input');
        input.focus();
        input.select();

        async function commit(name) {
          if (committed) return;
          committed = true;
          if (!name || name === current) { renderUsername(current); return; }
          try {
            const resp = await fetch('/auth/username', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username: name }),
            });
            const data = await resp.json();
            renderUsername(resp.ok ? data.username : current);
          } catch {
            renderUsername(current);
          }
        }

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); commit(input.value.trim()); }
          if (e.key === 'Escape') { committed = true; renderUsername(current); e.preventDefault(); }
          e.stopPropagation();
        });
        input.addEventListener('blur', () => commit(input.value.trim()));
      }

      async function checkAuth() {
        try {
          const resp = await fetch('/auth/me');
          const data = await resp.json();
          isAuthenticated = data.authenticated;
          if (data.no_auth) {
            hudAuth.style.display = 'none';
          } else if (isAuthenticated) {
            renderUsername(data.username);
          } else {
            hudAuth.innerHTML = `<a href="/auth/discord/login">login</a>`;
          }
        } catch {
          hudAuth.innerHTML = `<a href="/auth/discord/login">login</a>`;
        }
      }

      let authModalOpen = false;

      function showAuthModal() {
        authModalOpen = true;
        authModal.style.display = 'flex';
      }

      function hideAuthModal() {
        authModalOpen = false;
        authModal.style.display = 'none';
      }

      authModal.addEventListener('click', (e) => { if (e.target === authModal) hideAuthModal(); });

      document.getElementById('auth-modal-dismiss').addEventListener('click', hideAuthModal);

      function zoomMin() { return logW / (10 * CHUNK_SIZE * BASE_CELL_W); }
      function zoomMax() { return logW / (CHUNK_SIZE * BASE_CELL_W); }

      function applyZoom(newZoom, pivotX = logW / 2, pivotY = logH / 2) {
        newZoom = Math.max(zoomMin(), Math.min(zoomMax(), newZoom));
        const worldX = (pivotX - offsetX) / cellW;
        const worldY = (pivotY - offsetY) / cellH;
        zoom = newZoom;
        cellW = BASE_CELL_W * zoom;
        cellH = BASE_CELL_H * zoom;
        offsetX = pivotX - worldX * cellW;
        offsetY = pivotY - worldY * cellH;
        loadVisibleChunks();
      }

      function worldToChunk(wx, wy) {
        const gx = Math.floor(wx / CHUNK_SIZE);
        const gy = Math.floor(wy / CHUNK_SIZE);
        return { gx, gy, sx: wx - gx * CHUNK_SIZE, sy: wy - gy * CHUNK_SIZE };
      }

      function screenToWorld(px, py) {
        return {
          wx: Math.floor((px - offsetX) / cellW),
          wy: Math.floor((py - offsetY) / cellH),
        };
      }

      function visibleChunkRange() {
        const x0 = Math.floor(Math.floor(-offsetX / cellW) / CHUNK_SIZE);
        const y0 = Math.floor(Math.floor(-offsetY / cellH) / CHUNK_SIZE);
        const x1 = Math.floor(Math.ceil((logW - offsetX) / cellW) / CHUNK_SIZE);
        const y1 = Math.floor(Math.ceil((logH - offsetY) / cellH) / CHUNK_SIZE);
        return { x0, y0, x1, y1 };
      }

      function requestChunk(gx, gy) {
        const key = `${gx},${gy}`;
        if (requested.has(key) || !ws || ws.readyState !== WebSocket.OPEN) return;
        requested.add(key);
        ws.send(JSON.stringify({ type: 'get', g_x: gx, g_y: gy }));
      }

      function sendSet(wx, wy, ch) {
        if (!isAuthenticated) {
          showAuthModal();
          return;
        }
        const { gx, gy, sx, sy } = worldToChunk(wx, wy);
        const key = `${gx},${gy}`;
        if (!chunks.has(key)) {
          chunks.set(key, Array.from({ length: CHUNK_SIZE }, () => new Array(CHUNK_SIZE).fill('')));
        }
        chunks.get(key)[sx][sy] = ch;
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        requestChunk(gx, gy);
        ws.send(JSON.stringify({ type: 'set', g_x: gx, g_y: gy, s_x: sx, s_y: sy, data: ch }));
      }

      function sendCursorMove(wx, wy) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'cursor_move', wx, wy }));
      }

      function sendCursorClear() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'cursor_clear' }));
      }

      function loadVisibleChunks() {
        const { x0, y0, x1, y1 } = visibleChunkRange();
        for (let gx = x0; gx <= x1; gx++)
          for (let gy = y0; gy <= y1; gy++)
            requestChunk(gx, gy);
      }

      function connect() {
        let params = new URLSearchParams(document.location.search);
        let gx = params.get("gx", null);
        let gy = params.get("gy", null);
        if (gx !== null && gy !== null) {
          gx = parseInt(gx);
          gy = parseInt(gy);
          offsetX = -gx * CHUNK_SIZE * cellW + logW / 2;
          offsetY = -gy * CHUNK_SIZE * cellH + logH / 2;
        }
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/ws`);

        ws.onopen = () => {
          hudStatus.textContent = 'connected';
          hudStatus.className = 'connected';
          loadVisibleChunks();
        };

        ws.onclose = () => {
          hudStatus.textContent = 'reconnecting';
          hudStatus.className = 'disconnected';
          chunks.clear();
          requested.clear();
          otherCursors.clear();
          colorMap.clear();
          paletteIdx = 0;
          setTimeout(connect, 2000);
        };

        ws.onerror = () => ws.close();

        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'update_packet_get') {
            chunks.set(`${msg.g_x},${msg.g_y}`, msg.data);
          } else if (msg.type === 'welcome') {
            myId = msg.id;
            for (const c of msg.cursors) otherCursors.set(c.id, { wx: c.wx, wy: c.wy, username: c.username });
          } else if (msg.type === 'cursor_update') {
            if (msg.id !== myId) otherCursors.set(msg.id, { wx: msg.wx, wy: msg.wy, username: msg.username });
          } else if (msg.type === 'cursor_remove') {
            otherCursors.delete(msg.id);
          }
        };
      }

      function render() {
        const mainFont = `${Math.round(13 * zoom)}px "Courier New", Courier, monospace`;
        const smallFont = `${Math.round(9 * zoom)}px "Courier New", monospace`;

        ctx.fillStyle = '#0d0d0d';
        ctx.fillRect(0, 0, logW, logH);

        const { x0, y0, x1, y1 } = visibleChunkRange();

        ctx.strokeStyle = '#171f2a';
        ctx.lineWidth = 1;
        for (let gx = x0; gx <= x1 + 1; gx++) {
          const x = Math.round(gx * CHUNK_SIZE * cellW + offsetX) + 0.5;
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, logH); ctx.stroke();
        }
        for (let gy = y0; gy <= y1 + 1; gy++) {
          const y = Math.round(gy * CHUNK_SIZE * cellH + offsetY) + 0.5;
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(logW, y); ctx.stroke();
        }

        ctx.font = mainFont;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#c8c8c8';

        for (let gx = x0; gx <= x1; gx++) {
          for (let gy = y0; gy <= y1; gy++) {
            const data = chunks.get(`${gx},${gy}`);
            if (!data) continue;
            for (let sx = 0; sx < CHUNK_SIZE; sx++) {
              const wx = gx * CHUNK_SIZE + sx;
              const screenX = wx * cellW + offsetX;
              if (screenX + cellW < 0 || screenX > logW) continue;
              const col = data[sx];
              if (!col) continue;
              for (let sy = 0; sy < CHUNK_SIZE; sy++) {
                const ch = col[sy];
                if (!ch) continue;
                const wy = gy * CHUNK_SIZE + sy;
                const screenY = wy * cellH + offsetY;
                if (screenY + cellH < 0 || screenY > logH) continue;
                ctx.fillText(ch, screenX + cellW / 2, screenY + cellH / 2);
              }
            }
          }
        }

        ctx.font = smallFont;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        for (const [id, pos] of otherCursors) {
          const cx = pos.wx * cellW + offsetX;
          const cy = pos.wy * cellH + offsetY;
          if (cx + cellW < 0 || cx > logW || cy + cellH < 0 || cy > logH) continue;
          const [solid, faint] = getColor(id);
          ctx.fillStyle = faint;
          ctx.fillRect(cx, cy, cellW, cellH);
          ctx.strokeStyle = solid;
          ctx.lineWidth = 1;
          ctx.strokeRect(cx + 0.5, cy + 0.5, cellW - 1, cellH - 1);

          const { gx, gy, sx, sy } = worldToChunk(pos.wx, pos.wy);
          const cdata = chunks.get(`${gx},${gy}`);
          const cch = cdata?.[sx]?.[sy] || '';
          if (cch) {
            ctx.font = mainFont;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = solid;
            ctx.fillText(cch, cx + cellW / 2, cy + cellH / 2);
            ctx.font = smallFont;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
          }
          ctx.fillStyle = solid;
          ctx.fillText(pos.username || id.slice(0, 6), cx + cellW / 2, cy - 1);
        }

        if (cursor) {
          const cx = cursor.wx * cellW + offsetX;
          const cy = cursor.wy * cellH + offsetY;
          if (cursorOn) {
            ctx.fillStyle = '#2563eb';
            ctx.fillRect(cx, cy, cellW, cellH);
          } else {
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 1;
            ctx.strokeRect(cx + 0.5, cy + 0.5, cellW - 1, cellH - 1);
          }
          const { gx, gy, sx, sy } = worldToChunk(cursor.wx, cursor.wy);
          const data = chunks.get(`${gx},${gy}`);
          const ch = data?.[sx]?.[sy] || '';
          if (ch) {
            ctx.font = mainFont;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = cursorOn ? '#fff' : '#c8c8c8';
            ctx.fillText(ch, cx + cellW / 2, cy + cellH / 2);
          }
          hudCoords.textContent = `${cursor.wx}, ${cursor.wy}`;
        } else {
          const { wx, wy } = screenToWorld(logW / 2, logH / 2);
          hudCoords.textContent = `${wx}, ${wy}`;
        }

        if (selection) {
          const wx0 = Math.min(selection.start.wx, selection.end.wx);
          const wy0 = Math.min(selection.start.wy, selection.end.wy);
          const wx1 = Math.max(selection.start.wx, selection.end.wx);
          const wy1 = Math.max(selection.start.wy, selection.end.wy);
          const sx = wx0 * cellW + offsetX;
          const sy = wy0 * cellH + offsetY;
          const sw = (wx1 - wx0 + 1) * cellW;
          const sh = (wy1 - wy0 + 1) * cellH;
          ctx.fillStyle = 'rgba(37,99,235,0.15)';
          ctx.fillRect(sx, sy, sw, sh);
          ctx.strokeStyle = '#2563eb';
          ctx.lineWidth = 1;
          ctx.strokeRect(sx + 0.5, sy + 0.5, sw - 1, sh - 1);
        }
      }

      let blinkTimer = null;
      function resetBlink() {
        cursorOn = true;
        clearInterval(blinkTimer);
        blinkTimer = setInterval(() => { cursorOn = !cursorOn; }, 530);
      }

      function ensureCursorVisible() {
        if (!cursor) return;
        const margin = 3;
        const sx = cursor.wx * cellW + offsetX;
        const sy = cursor.wy * cellH + offsetY;
        if (sx < margin * cellW)              offsetX += margin * cellW - sx;
        if (sy < margin * cellH)              offsetY += margin * cellH - sy;
        if (sx > logW - (margin + 1) * cellW) offsetX -= sx - (logW - (margin + 1) * cellW);
        if (sy > logH - (margin + 1) * cellH) offsetY -= sy - (logH - (margin + 1) * cellH);
        loadVisibleChunks();
      }

      function moveCursorToBounded(wx, wy) {
        if (selection) {
          const x0 = Math.min(selection.start.wx, selection.end.wx);
          const y0 = Math.min(selection.start.wy, selection.end.wy);
          const x1 = Math.max(selection.start.wx, selection.end.wx);
          const y1 = Math.max(selection.start.wy, selection.end.wy);
          if (wx < x0) { wx = x1; wy = wy - 1; }
          if (wx > x1) { wx = x0; wy = wy + 1; }
          wy = wy < y0 ? y1 : wy > y1 ? y0 : wy;
        }
        cursor = { wx, wy };
        resetBlink();
        ensureCursorVisible();
        sendCursorMove(wx, wy);
      }

      window.addEventListener('keydown', (e) => {
        if (authModalOpen) {
          if (e.key === 'Escape') { hideAuthModal(); e.preventDefault(); }
          return;
        }

        if (e.ctrlKey || e.metaKey) {
          if (e.key === '=' || e.key === '+') {
            e.preventDefault();
            applyZoom(zoom * 1.25);
            return;
          }
          if (e.key === '-') {
            e.preventDefault();
            applyZoom(zoom / 1.25);
            return;
          }
          if (e.key === '0') {
            e.preventDefault();
            applyZoom(1.0);
            return;
          }
        }

        if (!cursor) return;

        switch (e.key) {
          case 'ArrowLeft':  moveCursorToBounded(cursor.wx - 1, cursor.wy); break;
          case 'ArrowRight': moveCursorToBounded(cursor.wx + 1, cursor.wy); break;
          case 'ArrowUp':    moveCursorToBounded(cursor.wx, cursor.wy - 1); break;
          case 'ArrowDown':  moveCursorToBounded(cursor.wx, cursor.wy + 1); break;
          case 'Enter':      moveCursorToBounded(cursor.wx, cursor.wy + 1); break;
          case 'Escape':
            cursor = null;
            sendCursorClear();
            if (isMobile) mobileInput.blur();
            e.preventDefault();
            return;
          case 'Backspace':
            sendSet(cursor.wx, cursor.wy, '');
            moveCursorToBounded(cursor.wx - 1, cursor.wy);
            break;
          case 'Delete':
            sendSet(cursor.wx, cursor.wy, '');
            break;
          default:
            if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
              sendSet(cursor.wx, cursor.wy, e.key);
              moveCursorToBounded(cursor.wx + 1, cursor.wy);
              e.preventDefault();
            }
            return;
        }

        e.preventDefault();
        resetBlink();
        ensureCursorVisible();
        if (cursor) sendCursorMove(cursor.wx, cursor.wy);
      });

      mobileInput.addEventListener('input', (e) => {
        if (!cursor || !e.data) { mobileInput.value = ''; return; }
        for (const ch of e.data) {
          if (ch.length === 1) {
            sendSet(cursor.wx, cursor.wy, ch);
            cursor = { wx: cursor.wx + 1, wy: cursor.wy };
          }
        }
        moveCursorToBounded(cursor.wx, cursor.wy);
        mobileInput.value = '';
      });

      function pointerDown(px, py, select = false) {
        dragging = true;
        selection = null;
        if (select) selecting = true;
        dragMoved = false;
        dragStartX = px;
        dragStartY = py;
        dragBaseOffX = offsetX;
        dragBaseOffY = offsetY;
      }

      function pointerMove(px, py) {
        if (!dragging) return;
        if (selecting) {
          const { wx, wy } = screenToWorld(px, py);
          if (!selection) {
            selection = { start: { wx, wy }, end: { wx, wy } };
          } else {
            selection.end = { wx, wy };
          }
        } else {
          const dx = px - dragStartX, dy = py - dragStartY;
          if (Math.abs(dx) > 4 || Math.abs(dy) > 4) dragMoved = true;
          offsetX = dragBaseOffX + dx;
          offsetY = dragBaseOffY + dy;
        }
        loadVisibleChunks();
      }

      function pointerUp(px, py) {
        if (!dragging) return;
        dragging = false;
        selecting = false;
        if (!dragMoved) {
          if (selection) {
            const a = selection.start, b = selection.end;
            selection.start = { wx: Math.min(a.wx, b.wx), wy: Math.min(a.wy, b.wy) };
            selection.end = { wx: Math.max(a.wx, b.wx), wy: Math.max(a.wy, b.wy) };
          }
          // Treat as click → place cursor or move to new selection start
          const { wx, wy } = selection ? selection.start : screenToWorld(px, py);
          cursor = { wx, wy };
          const { gx, gy } = worldToChunk(wx, wy);
          requestChunk(gx, gy);
          resetBlink();
          sendCursorMove(wx, wy);
          if (isMobile) mobileInput.focus();
        }
        canvas.style.cursor = 'crosshair';
      }

      canvas.addEventListener('mousedown', (e) => {
        pointerDown(e.clientX, e.clientY, e.shiftKey);
        canvas.style.cursor = 'grabbing';
        e.preventDefault();
      });
      window.addEventListener('mousemove', (e) => pointerMove(e.clientX, e.clientY));
      window.addEventListener('mouseup',   (e) => pointerUp(e.clientX, e.clientY));

      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.ctrlKey) {
          // Pinch-to-zoom (touch pad pinch or Ctrl+scroll)
          const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
          applyZoom(zoom * factor, e.clientX, e.clientY);
        } else {
          // Two-finger pan (touch pad scroll)
          offsetX -= e.deltaX;
          offsetY -= e.deltaY;
          loadVisibleChunks();
        }
      }, { passive: false });

      canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          pointerDown(e.touches[0].clientX, e.touches[0].clientY, e.shiftKey);
        } else if (e.touches.length === 2) {
          dragging = false;
          const dx = e.touches[1].clientX - e.touches[0].clientX;
          const dy = e.touches[1].clientY - e.touches[0].clientY;
          pinchDist = Math.hypot(dx, dy);
        }
        e.preventDefault();
      }, { passive: false });
      canvas.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1 && pinchDist === null) {
          pointerMove(e.touches[0].clientX, e.touches[0].clientY);
        } else if (e.touches.length === 2 && pinchDist !== null) {
          const dx = e.touches[1].clientX - e.touches[0].clientX;
          const dy = e.touches[1].clientY - e.touches[0].clientY;
          const newDist = Math.hypot(dx, dy);
          const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          applyZoom(zoom * (newDist / pinchDist), midX, midY);
          pinchDist = newDist;
        }
        e.preventDefault();
      }, { passive: false });
      canvas.addEventListener('touchend', (e) => {
        const wasPinching = pinchDist !== null;
        if (e.touches.length < 2) pinchDist = null;
        if (wasPinching && e.touches.length === 1) {
          // Transition from pinch to single finger: re-anchor drag to avoid jump
          pointerDown(e.touches[0].clientX, e.touches[0].clientY);
        } else if (!wasPinching && e.touches.length === 0 && e.changedTouches.length) {
          pointerUp(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
        }
        e.preventDefault();
      }, { passive: false });

      function resize() {
        logW = window.innerWidth;
        logH = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = Math.round(logW * dpr);
        canvas.height = Math.round(logH * dpr);
        canvas.style.width  = logW + 'px';
        canvas.style.height = logH + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const clamped = Math.max(zoomMin(), Math.min(zoomMax(), zoom));
        if (clamped !== zoom) applyZoom(clamped);
        loadVisibleChunks();
      }

      window.addEventListener('resize', resize);

      function loop() {
        render();
        requestAnimationFrame(loop);
      }

      const shareBtn = document.getElementById('share-btn');
      shareBtn.addEventListener('click', () => {
        const { wx, wy } = screenToWorld(logW / 2, logH / 2);
        const { gx, gy } = worldToChunk(wx, wy);
        const url = `${location.origin}${location.pathname}?gx=${gx}&gy=${gy}`;
        navigator.clipboard.writeText(url).then(() => {
          shareBtn.textContent = 'copied!';
          shareBtn.classList.add('copied');
          setTimeout(() => {
            shareBtn.textContent = 'share';
            shareBtn.classList.remove('copied');
          }, 1500);
        });
      });

      document.getElementById('zoom-in').addEventListener('click', () => applyZoom(zoom * 1.25));
      document.getElementById('zoom-out').addEventListener('click', () => applyZoom(zoom / 1.25));

      resize();
      offsetX = Math.round(logW / 2);
      offsetY = Math.round(logH / 2);
      canvas.style.cursor = 'crosshair';
      connect();
      resetBlink();
      loop();
      checkAuth();
      </script>
    </body>
</html>
